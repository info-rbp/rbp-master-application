name: Promote to Staging

on:
  push:
    tags:
      - 'v*'
      - 'release-*'
  workflow_dispatch:
    inputs:
      release_ref:
        description: 'Git ref (tag/sha) to promote to staging'
        required: true
        default: 'main'

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  validate-and-promote:
    name: Validate, Deploy, Smoke (staging)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: staging
    permissions:
      contents: read

    env:
      FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
      FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
      APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
      SMOKE_AUTH_COOKIE: ${{ secrets.SMOKE_AUTH_COOKIE }}
      SMOKE_AUTH_HEADER: ${{ secrets.SMOKE_AUTH_HEADER }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.release_ref || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate release candidate
        run: |
          npm run lint
          npm run typecheck
          npm run test:platform
          npm run test:bff
          npm run build

      - name: Validate staging configuration
        run: ./scripts/ci/validate-env-config.sh staging

      - name: Deploy to Firebase App Hosting (staging)
        run: ./scripts/ci/deploy-apphosting.sh staging

      - name: Smoke checks (staging)
        run: ./scripts/ci/smoke-test.sh staging

      - name: Staging sign-off instructions
        run: |
          echo "## Staging Promotion Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "- Verify critical user journeys and admin controls." >> "$GITHUB_STEP_SUMMARY"
          echo "- Obtain product + operations sign-off before production dispatch." >> "$GITHUB_STEP_SUMMARY"

      - name: Write deployment summary
        if: always()
        run: ./scripts/ci/write-deployment-summary.sh staging "${{ job.status }}" "${{ github.ref }}"

      - name: Upload deployment artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-staging-artifacts-${{ github.run_id }}
          retention-days: 30
          if-no-files-found: ignore
          path: |
            artifacts/**/*.md
            firebase-debug*.log
            npm-debug.log*
