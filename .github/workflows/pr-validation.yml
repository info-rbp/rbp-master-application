name: PR Validation

on:
  pull_request:
    branches:
      - master

concurrency:
  group: pr-validation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate PR
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Platform tests
        run: npm run test:platform

      - name: BFF tests
        run: npm run test:bff

      - name: Build
        run: npm run build

      - name: Upload failure logs/artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pr-validation-logs-${{ github.run_id }}
          retention-days: 14
          if-no-files-found: ignore
          path: |
            npm-debug.log*
            firebase-debug*.log
            .next/**/*.log
            artifacts/**/*.md
