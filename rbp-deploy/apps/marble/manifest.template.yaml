# Template deployment manifest for marble
apiVersion: deploy.rbp/v1
kind: ServiceDeployment
metadata:
  name: marble
spec:
  enabled: true
  runtime: risk_decision_engine
  replicas:
    dev: 1
    staging: 1
    prod: <replace-me>
  image:
    repository: "<replace-me>/marble"
    tag_strategy: "<git-sha|semver>"
  resources:
    cpu: "<replace-me>"
    memory: "<replace-me>"
  health:
    liveness_path: "<replace-me>"
    readiness_path: "<replace-me>"
