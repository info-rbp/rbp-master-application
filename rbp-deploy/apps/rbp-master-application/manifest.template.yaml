# Template deployment manifest for rbp-master-application
apiVersion: deploy.rbp/v1
kind: ServiceDeployment
metadata:
  name: rbp-master-application
spec:
  enabled: true
  runtime: nextjs_app_hosting
  replicas:
    dev: 1
    staging: 1
    prod: <replace-me>
  image:
    repository: "<replace-me>/rbp-master-application"
    tag_strategy: "<git-sha|semver>"
  resources:
    cpu: "<replace-me>"
    memory: "<replace-me>"
  health:
    liveness_path: "<replace-me>"
    readiness_path: "<replace-me>"
