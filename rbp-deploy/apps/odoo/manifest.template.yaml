# Template deployment manifest for odoo
apiVersion: deploy.rbp/v1
kind: ServiceDeployment
metadata:
  name: odoo
spec:
  enabled: true
  runtime: erp_application
  replicas:
    dev: 1
    staging: 1
    prod: <replace-me>
  image:
    repository: "<replace-me>/odoo"
    tag_strategy: "<git-sha|semver>"
  resources:
    cpu: "<replace-me>"
    memory: "<replace-me>"
  health:
    liveness_path: "<replace-me>"
    readiness_path: "<replace-me>"
