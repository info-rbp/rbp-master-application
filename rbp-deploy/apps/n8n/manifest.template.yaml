# Template deployment manifest for n8n
apiVersion: deploy.rbp/v1
kind: ServiceDeployment
metadata:
  name: n8n
spec:
  enabled: true
  runtime: workflow_automation
  replicas:
    dev: 1
    staging: 1
    prod: <replace-me>
  image:
    repository: "<replace-me>/n8n"
    tag_strategy: "<git-sha|semver>"
  resources:
    cpu: "<replace-me>"
    memory: "<replace-me>"
  health:
    liveness_path: "<replace-me>"
    readiness_path: "<replace-me>"
